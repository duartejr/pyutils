site_name: pyutils
site_description: Hydroclimate analysis toolkit — evapotranspiration, spatial interpolation, precipitation indices, NetCDF I/O, and cartographic utilities.
site_author: Duarte Junior
site_url: https://duartejr.github.io/pyutils
repo_url: https://github.com/duartejr/pyutils
repo_name: duartejr/pyutils
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_submodules: false
            members_order: source
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - API Reference:
    - Hydrology:
      - Overview: api/hydrology/index.md
      - Evapotranspiration: api/hydrology/evapotranspiration.md
      - Water Balance: api/hydrology/water_balance.md
      - Drought Indices (SPI): api/hydrology/indices.md
      - Flow Analysis: api/hydrology/flow_analysis.md
    - Geospatial:
      - Overview: api/geospatial/index.md
      - NetCDF I/O (xarray): api/geospatial/io.md
      - Interpolation (IDW / Thiessen): api/geospatial/interpolation.md
      - Shapefile Operations: api/geospatial/shapefile.md
      - Visualization: api/geospatial/visualization.md
    - Climate:
      - Overview: api/climate/index.md
      - Bias Correction: api/climate/bias_correction.md
    - Utils:
      - Overview: api/utils/index.md
      - Validators: api/utils/validators.md
      - Unit Conversions: api/utils/conversions.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/duartejr/pyutils
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/duarte-junior-9530595a
      name: LinkedIn
    - icon: fontawesome/regular/envelope
      link: mailto:duarte.jr105@gmail.com
      name: Email

